description: |
  Generate, translate, validate, and maintain AI coding assistant skills across
  Claude Code, Cursor, OpenAI Codex CLI, and GitHub Copilot from a single source
  of truth under .ai/skills/. Use when: generating skill configs for a new repo,
  translating existing skills between harnesses, validating harness skill folders
  for errors or broken symlinks, analyzing a codebase to extract its conventions,
  or scaffolding new skill files with a ready-to-run build script.
  Modes: analyze | generate | translate | validate | build-skill.
  NOT for: CLAUDE.md, AGENTS.md, .cursor/rules/, .github/instructions/, or any
  other project-level harness config outside the four skills folders.
allowed-tools:
  - Read
  - Write
  - Edit
  - Bash
  - Glob
  - Grep
argument-hint: "analyze | generate | translate | validate | build-skill"
